name: Vixer
options:
  bundleIdPrefix: com.armanmohammadi
  deploymentTarget:
    macOS: "14.2"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    SWIFT_APPROACHABLE_CONCURRENCY: YES
    MACOSX_DEPLOYMENT_TARGET: "14.2"
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "-"
    DEVELOPMENT_TEAM: ""
targets:
  Vixer:
    type: application
    platform: macOS
    sources:
      - path: Vixer
        excludes:
          - "Info.plist"
          - "Vixer.entitlements"
    info:
      path: Vixer/Info.plist
      properties:
        LSUIElement: false
        LSMinimumSystemVersion: "14.2"
        CFBundleName: Vixer
        CFBundleDisplayName: Vixer
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        NSAudioCaptureUsageDescription: "Vixer captures app audio output to apply per-app volume."
        NSHumanReadableCopyright: ""
        CFBundleIconName: AppIcon
    dependencies:
      - sdk: AppIntents.framework
    entitlements:
      path: Vixer/Vixer.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.device.audio-input: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.armanmohammadi.Vixer
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
  VixerTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - VixerTests
    dependencies:
      - target: Vixer
      - sdk: AppIntents.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.armanmohammadi.VixerTests
        GENERATE_INFOPLIST_FILE: YES
schemes:
  Vixer:
    build:
      targets:
        Vixer: all
        VixerTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - VixerTests
